# config/config.yaml
models:
  # prosecutor: "gemini/gemini-2.5-flash" #"groq/llama-3.1-8b-instant"
  # defender:   "gemini/gemini-2.5-flash" #"cerebras/llama-3.1-8b"
  # judge:      "gemini/gemini-2.5-flash"
  # Target Hugging Face models for late POC:
  # prosecutor: "huggingface/meta-llama/Llama-3.2-3B-Instruct"
  # defender:   "huggingface/meta-llama/Llama-3.2-3B-Instruct"
  # judge:      "huggingface/deepseek-ai/DeepSeek-R1-Distill-Llama-8B"

  judge: "ollama/llama3.2:3b"
  defender: "ollama/deepseek-r1:8b"
  prosecutor: "ollama/deepseek-r1:8b"
  evaluator: "ollama/qwen2.5:7b-instruct"

inference:
  max_tokens:    2048
  temperature:   0.3
  load_strategy: sequential   # Load one model at a time; unload after turn
  max_retries:   2

monitoring:
  langsmith_enabled: false
  langsmith_project: "chatree-deka-poc"

training:
  case_file: "case-file/1.json"
  marti_config: "config/marti_config.yaml"
  reward_weights:
    compliance: 0.6
    verdict: 0.4
  batch_size: 1
  max_episodes: 100
  checkpoint_every: 10
  checkpoint_path: "training/checkpoints"
